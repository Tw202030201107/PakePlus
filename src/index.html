<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>岷县二中高三级第二级部巡课记录系统 ·</title>
    <!-- 强制使用 HTTPS 且添加 integrity 校验，保障库加载稳定性 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft Yahei", sans-serif;
            padding: 12px 10px 76px;
            color: #1e293b;
            font-size: 15px;
            line-height: 1.5;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            padding: 16px 12px 20px;
        }
        .app-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            padding-bottom: 12px;
            border-bottom: 1px solid #eef2f6;
            margin-bottom: 16px;
        }
        .app-title small {
            font-size: 12px;
            font-weight: 400;
            color: #94a3b8;
            display: block;
            margin-top: 2px;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 14px;
            border: 1px solid #eef2f6;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #2563eb;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef2f6;
            margin-bottom: 12px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ===== 底部导航 ===== */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            display: flex;
            padding: 4px 0 env(safe-area-inset-bottom, 0);
            height: 64px;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.04);
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 11px;
            gap: 2px;
            cursor: pointer;
            padding: 6px 0;
            border-radius: 8px;
            transition: 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-item .tab-icon {
            font-size: 22px;
        }
        .tab-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }

        /* ===== 录入表格 ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 8px;
        }
        .form-item {
            background: #f8fafc;
            border-radius: 10px;
            padding: 8px 10px;
        }
        .form-item label {
            display: block;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .form-item input,
        .form-item select {
            width: 100%;
            padding: 10px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            transition: 0.15s;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-item input:focus,
        .form-item select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.10);
        }
        .form-item input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .form-item.full {
            grid-column: 1 / -1;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -6px;
            padding: 0 6px;
        }
        .class-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border-radius: 10px;
            overflow: hidden;
            min-width: 300px;
        }
        .class-table th,
        .class-table td {
            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
        }
        .class-table th {
            background: #f1f5f9;
            font-weight: 600;
            font-size: 13px;
        }
        .class-table td.teacher-cell {
            position: relative;
            padding: 4px;
            min-width: 100px;
        }
        .class-table td.teacher-cell input {
            width: 100%;
            padding: 8px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            transition: 0.15s;
        }
        .class-table td.teacher-cell input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.10);
        }
        .class-table td.teacher-cell input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .class-table td.note-cell select {
            width: 100%;
            padding: 8px 4px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        .teacher-input-wrap {
            position: relative;
            width: 100%;
        }
        .autocomplete-list {
            position: absolute;
            top: calc(100% + 2px);
            left: 4px;
            right: 4px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 160px;
            overflow-y: auto;
            z-index: 50;
            display: none;
            list-style: none;
            padding: 4px 0;
            margin: 0;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.10);
        }
        .autocomplete-list.show {
            display: block;
        }
        .autocomplete-list li {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }
        .autocomplete-list li:last-child {
            border-bottom: none;
        }
        .autocomplete-list li:hover,
        .autocomplete-list li.active {
            background: #eff6ff;
            color: #2563eb;
        }
        .autocomplete-list li .highlight {
            font-weight: 700;
            color: #2563eb;
        }
        .autocomplete-list .no-match {
            color: #94a3b8;
            text-align: center;
            cursor: default;
            padding: 12px 14px;
        }

        /* ===== 按钮 ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-row button {
            flex: 1;
            min-width: 70px;
        }
        button {
            padding: 14px 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.5;
            transform: none !important;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:active {
            background: #1d4ed8;
        }
        .btn-success {
            background: #059669;
            color: #fff;
        }
        .btn-success:active {
            background: #047857;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:active {
            background: #b91c1c;
        }
        .btn-warning {
            background: #f59e0b;
            color: #fff;
        }
        .btn-warning:active {
            background: #d97706;
        }
        .btn-purple {
            background: #8b5cf6;
            color: #fff;
        }
        .btn-purple:active {
            background: #7c3aed;
        }
        .btn-gray {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-sm {
            padding: 10px 12px;
            font-size: 13px;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            padding: 8px 10px;
            background: #f8fafc;
            border-radius: 10px;
            align-items: center;
        }
        .filter-bar input,
        .filter-bar select {
            flex: 1;
            min-width: 80px;
            padding: 8px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        .filter-bar button {
            padding: 8px 12px;
            font-size: 13px;
        }

        /* ===== 统计 ===== */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            justify-content: center;
            padding: 10px 12px;
            background: #f1f5f9;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .stats-bar span {
            color: #64748b;
        }
        .stats-bar strong {
            color: #0f172a;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            border-radius: 10px;
            overflow: hidden;
            min-width: 560px;
        }
        .data-table th,
        .data-table td {
            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
            font-size: 12px;
        }
        .data-table .empty-row td {
            padding: 24px 10px;
            color: #94a3b8;
            font-size: 14px;
        }
        .del-btn,
        .edit-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin: 2px;
            touch-action: manipulation;
        }
        .del-btn {
            background: #dc2626;
            color: #fff;
        }
        .del-btn:active {
            background: #b91c1c;
        }
        .edit-btn {
            background: #2563eb;
            color: #fff;
        }
        .edit-btn:active {
            background: #1d4ed8;
        }
        .class-row td {
            background: #fffbeb !important;
            font-size: 12px;
            color: #991b1b;
        }
        .total-cell {
            color: #dc2626;
            font-weight: 700;
            font-size: 14px;
        }

        /* ===== 折叠面板 ===== */
        .collapse-panel {
            border: 1px solid #eef2f6;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .collapse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 14px;
            background: #f8fafc;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            font-size: 15px;
            color: #0f172a;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .collapse-header:hover {
            background: #eef2f6;
        }
        .collapse-header .arrow {
            transition: transform 0.25s;
            font-size: 14px;
            color: #94a3b8;
        }
        .collapse-header .arrow.open {
            transform: rotate(90deg);
        }
        .collapse-body {
            padding: 12px 14px;
            background: #ffffff;
            display: none;
        }
        .collapse-body.open {
            display: block;
        }

        /* ===== 管理面板 ===== */
        .mgmt-search {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #f8fafc;
            margin-bottom: 10px;
            transition: 0.15s;
            -webkit-appearance: none;
            appearance: none;
        }
        .mgmt-search:focus {
            outline: none;
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.10);
        }
        .mgmt-list {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid #eef2f6;
            border-radius: 8px;
            padding: 4px 0;
        }
        .mgmt-list .empty-hint {
            color: #94a3b8;
            text-align: center;
            padding: 16px 0;
            font-size: 14px;
        }
        .mgmt-add-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .mgmt-add-area input,
        .mgmt-add-area select {
            flex: 1;
            min-width: 100px;
            padding: 10px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        .mgmt-add-area button {
            padding: 10px 14px;
            font-size: 14px;
        }
        .mgmt-add-area .teacher-input-wrap {
            flex: 1;
            min-width: 120px;
            position: relative;
        }
        .mgmt-add-area .teacher-input-wrap input {
            width: 100%;
            padding: 10px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
        }
        .mgmt-add-area .teacher-input-wrap .autocomplete-list {
            top: calc(100% + 2px);
            left: 0;
            right: 0;
            max-height: 140px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #f8fafc;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .list-item .remove-btn {
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 13px;
            touch-action: manipulation;
        }
        .list-item .remove-btn:active {
            background: #b91c1c;
        }
        .list-item .tag {
            background: #e2e8f0;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 12px;
            color: #475569;
            margin-left: 6px;
        }

        /* ===== 切换开关 ===== */
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
        }
        .toggle-label input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #2563eb;
        }
        .backup-status {
            margin-top: 6px;
            font-size: 13px;
            color: #64748b;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .modal-box h3 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 16px;
            color: #0f172a;
        }
        .modal-box .field {
            margin-bottom: 14px;
        }
        .modal-box .field label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 4px;
        }
        .modal-box .field input,
        .modal-box .field select {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        .modal-box .btn-row {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }
        .modal-box .btn-row button {
            flex: 1;
        }

        /* ===== Toast ===== */
        .toast-wrap {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        .toast-item {
            pointer-events: auto;
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            width: 100%;
            text-align: center;
            animation: fadeDown 0.25s ease;
        }
        .toast-success {
            background: #059669;
        }
        .toast-error {
            background: #dc2626;
        }
        .toast-warning {
            background: #f59e0b;
        }
        .toast-info {
            background: #2563eb;
        }
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toast-item.hide {
            animation: fadeUp 0.25s ease forwards;
        }
        @keyframes fadeUp {
            to {
                opacity: 0;
                transform: translateY(-16px);
            }
        }

        /* ===== 版本标签 ===== */
        .version-tag {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 14px;
            opacity: 0.6;
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 420px) {
            .app-container {
                padding: 12px 8px 16px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .class-table {
                font-size: 13px;
                min-width: 260px;
            }
            .class-table td.teacher-cell {
                min-width: 80px;
            }
            .btn-row {
                flex-direction: column;
            }
            .btn-row button {
                min-width: unset;
            }
            .data-table {
                font-size: 12px;
                min-width: 440px;
            }
            .filter-bar input,
            .filter-bar select {
                min-width: 70px;
                font-size: 13px;
            }
            .tab-bar {
                height: 60px;
            }
            .tab-item {
                font-size: 10px;
            }
            .tab-item .tab-icon {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="toast-wrap" id="toastWrap"></div>

    <div class="app-container" id="app">

        <div class="app-title">
            高三级第二级部巡课记录系统
            <small>岷县二中</small>
        </div>

        <!-- ===== 主内容（直接显示，无登录） ===== -->
        <div id="mainContent">

            <!-- ========== 录入页 ========== -->
            <div class="page active" id="page1">
                <div class="card">
                    <div class="card-title">📝 填写巡课信息</div>
                    <div class="form-grid">
                        <div class="form-item">
                            <label>日期</label>
                            <input type="date" id="date" />
                        </div>
                        <div class="form-item">
                            <label>周数</label>
                            <input type="number" id="weekNum" placeholder="周数" min="1" max="30" />
                        </div>
                        <div class="form-item full">
                            <label>节次</label>
                            <select id="jieci">
                                <option>早读</option><option>上午第一节课</option><option>上午第二节课</option>
                                <option>上午第三节课</option><option>上午第四节课</option><option>上午第五节课</option>
                                <option>午休</option><option>下午第一节课</option><option>下午第二节课</option>
                                <option>下午第三节课</option><option>下午自习</option><option>晚自习</option>
                            </select>
                        </div>
                        <div class="form-item full">
                            <label>巡课教师</label>
                            <input id="xunkeTeacher" placeholder="输入姓名或拼音首字母" maxlength="20" />
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">🏫 各班巡课明细</div>
                    <div class="table-wrap">
                        <table class="class-table" id="classTable">
                            <thead><tr><th>班级</th><th>授课教师</th><th>巡课情况</th></tr></thead>
                            <tbody id="classBody"></tbody>
                        </table>
                    </div>
                    <div class="btn-group">
                        <button class="btn-primary" id="saveBtn">💾 保存当前班级巡课记录</button>
                        <div class="btn-row">
                            <button class="btn-success" id="exportExcelBtn">📊 导出全部Excel（明细+汇总）</button>
                            <button class="btn-warning" id="backupBtn">📁 手动备份（含教师/班级名单）</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========== 统计页 ========== -->
            <div class="page" id="page2">
                <div class="card">
                    <div class="card-title">📊 巡课台账</div>

        // ================================================================
        //  拼音联想核心
        // ================================================================
        function createFilterFunction(dataSource) {
            return function(query) {
                if (!query || query.length === 0) return [];
                const trim = query.trim();
                if (trim === '') return [];
                const lower = trim.toLowerCase();
                const hasLetter = /[a-zA-Z]/.test(trim);
                return dataSource.filter(name => {
                    if (name.includes(trim)) return true;
                    if (hasLetter) {
                        const py = teacherPinyinMap[name] || '';
                        if (py.includes(lower)) return true;
                    }
                    return false;
                });
            };
        }

        // 通用联想绑定
        function bindAutocompleteSimple(input, dataSource, onSelect) {
            const wrap = input.closest('.teacher-input-wrap') || input.parentElement;
            if (wrap) wrap.style.position = 'relative';

            let ul = wrap.querySelector('.autocomplete-list');
            if (!ul) {
                ul = document.createElement('ul');
                ul.className = 'autocomplete-list';
                wrap.appendChild(ul);
            }

            let active = -1,
                matches = [];
            const filterFn = createFilterFunction(dataSource);

            function render(arr) {
                ul.innerHTML = '';
                if (!arr || arr.length === 0) {
                    const q = input.value.trim();
                    if (q.length > 0) {
                        const li = document.createElement('li');
                        li.className = 'no-match';
                        li.textContent = '⚠️ 未匹配';
                        ul.appendChild(li);
                        ul.classList.add('show');
                    } else { ul.classList.remove('show'); }
                    active = -1;
                    return;
                }
                matches = arr;
                arr.forEach((name, idx) => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.dataset.index = idx;
                    const q = input.value.trim();
                    const pos = name.indexOf(q);
                    if (pos !== -1) {
                        li.innerHTML = escapeHtml(name.slice(0, pos)) +
                            `<span class="highlight">${escapeHtml(name.slice(pos, pos+q.length))}</span>` +
                            escapeHtml(name.slice(pos + q.length));
                    }
                    li.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        const val = this.textContent.trim();
                        input.value = val;
                        ul.classList.remove('show');
                        active = -1;
                        if (onSelect) onSelect(val);
                        input.dispatchEvent(new Event('input', { bubbles: true }));
                    });
                    li.addEventListener('mouseenter', function() {
                        const i = parseInt(this.dataset.index);
                        setActive(i);
                    });
                    ul.appendChild(li);
                });
                ul.classList.add('show');
                active = -1;
            }

            function setActive(idx) {
                const items = ul.querySelectorAll('li:not(.no-match)');
                items.forEach((li, i) => li.classList.toggle('active', i === idx));
                if (idx >= 0 && idx < items.length) items[idx].scrollIntoView({ block: 'nearest' });
                active = idx;
            }

            function selectActive() {
                if (active >= 0 && active < matches.length) {
                    const val = matches[active];
                    input.value = val;
                    ul.classList.remove('show');
                    active = -1;
                    if (onSelect) onSelect(val);
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    return true;
                }
                return false;
            }

            const newInput = input.cloneNode(true);
            input.parentNode.replaceChild(newInput, input);
            newInput.addEventListener('input', function() {
                const v = this.value;
                const filtered = filterFn(v);
                render(filtered);
                this.classList.remove('error');
            });
            newInput.addEventListener('focus', function() {
                const v = this.value.trim();
                if (v.length > 0) {
                    const filtered = filterFn(v);
                    render(filtered);
                }
                this.classList.remove('error');
            });
            newInput.addEventListener('blur', function() {
                setTimeout(() => { ul.classList.remove('show');
                    active = -1; }, 180);
            });
            newInput.addEventListener('keydown', function(e) {
                const items = ul.querySelectorAll('li:not(.no-match)');
                if (items.length === 0) { if (e.key === 'Enter') { ul.classList.remove('show'); } return; }
                if (e.key === 'ArrowDown') { e.preventDefault();
                    setActive(active + 1 < items.length ? active + 1 : 0); } else if (e.key === 'ArrowUp') { e
                        .preventDefault();
                    setActive(active - 1 >= 0 ? active - 1 : items.length - 1); } else if (e.key === 'Enter') { e
                        .preventDefault(); if (active >= 0 && active < matches.length) selectActive();
                    else { ul.classList.remove('show'); } } else if (e.key === 'Escape') { ul.classList.remove(
                        'show');
                    active = -1; }
            });

            return newInput;
        }

                weekNum: document.getElementById('weekNum').value,
                jieci: document.getElementById('jieci').value,
                xunkeTeacher: document.getElementById('xunkeTeacher').value,

            classes.forEach(cn => {

                const n = document.querySelector(`.note-select[data-class="${cn}"]`);
                if (t) draft.teachers[cn] = t.value;

            });

        function loadDraft() {
            try { const raw = localStorage.getItem(DRAFT_KEY); return raw ? JSON.parse(raw) : null; } catch (_) { return null; }
        }

        function applyDraft(draft) {
            if (!draft) return;
            if (draft.date) document.getElementById('date').value = draft.date;
            if (draft.weekNum) document.getElementById('weekNum').value = draft.weekNum;
            if (draft.jieci) document.getElementById('jieci').value = draft.jieci;
            if (draft.xunkeTeacher) document.getElementById('xunkeTeacher').value = draft.xunkeTeacher;
            if (draft.teachers) {
                Object.keys(draft.teachers).forEach(cn => {
                    const inp = document.querySelector(`.tea-input[data-class="${cn}"]`);
                    if (inp) inp.value = draft.teachers[cn] || '';

            if (draft.notes) {

                    const sel = document.querySelector(`.note-select[data-class="${cn}"]`);
                    if (sel) sel.value = draft.notes[cn] || '正常';

        // ================================================================
        //  验证与保存（含唯一性校验）
        // ================================================================
        function validate() {
            const date = document.getElementById('date').value;
            const week = document.getElementById('weekNum').value.trim();
            const xunke = document.getElementById('xunkeTeacher').value.trim();
            let ok = true;
            if (!date) { document.getElementById('date').classList.add('error');
                ok = false; } else document.getElementById('date').classList.remove('error');
            if (!week || isNaN(week) || parseInt(week) < 1 || parseInt(week) > 30) { document.getElementById('weekNum')
                    .classList.add('error');
                ok = false; } else document.getElementById('weekNum').classList.remove('error');
            if (!xunke || xunke.length < 2) { document.getElementById('xunkeTeacher').classList.add('error');
                ok = false; } else document.getElementById('xunkeTeacher').classList.remove('error');

            const teaInputs = document.querySelectorAll('.tea-input');
            let has = false;
            teaInputs.forEach(inp => {
                if (inp.value.trim()) has = true;
                inp.classList.toggle('error', !inp.value.trim());
            });
            if (!has) { showToast('请至少填写一个班级的授课教师', 'warning'); return false; }
            if (!ok) { showToast('请完善红色标记的必填项', 'warning'); return false; }
            return true;
        }

        function handleSave() {
            if (!validate()) return;
            const date = document.getElementById('date').value;
            const week = document.getElementById('weekNum').value.trim();
            const jieci = document.getElementById('jieci').value;
            const xunke = document.getElementById('xunkeTeacher').value.trim();
            const classList = getClassList().map(c => c.name);
            let all = getData();
            const news = [];
            const warns = [];

            classList.forEach(cn => {
                const tea = document.querySelector(`.tea-input[data-class="${cn}"]`).value.trim();
                const note = document.querySelector(`.note-select[data-class="${cn}"]`).value || '正常';
                if (!tea) return;

                // ★ 唯一性校验：同一班级同一日期同一节次不可重复
                const exists = all.some(i =>
                    i.date === date &&
                    String(i.weekNum) === String(week) &&
                    i.jieci === jieci &&
                    i.banji === cn
                );
                if (exists) { warns.push(cn); return; }

                news.push({
                    id: genId(),
                    date,
                    weekNum: String(week),
                    jieci,
                    banji: cn,
                    teacher: tea,
                    xunkeTeacher: xunke,
                    remark: note,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
            });

            if (warns.length) showToast(`跳过重复记录: ${warns.join('、')}`, 'warning', 3500);
            if (news.length === 0) {
                if (warns.length) showToast('所有班级均已存在记录，无需重复保存', 'info');
                else showToast('未填写任何班级的授课教师', 'warning');
                return;
            }

            all.push(...news);
            if (saveData(all)) {
                showToast(`✅ 保存成功！共录入 ${news.length} 个班级`, 'success');
                renderHistory();
                renderSummary();
                renderAbnormal();
                saveDraft();
            }
        }

        let currentFilter = { dateStart: '', dateEnd: '', teacher: '', banji: '', jieci: '' };

        function renderHistory() {
            const list = getData();
            const filtered = list.filter(i => {
                if (currentFilter.dateStart && i.date < currentFilter.dateStart) return false;
                if (currentFilter.dateEnd && i.date > currentFilter.dateEnd) return false;
                if (currentFilter.teacher && !i.teacher.includes(currentFilter.teacher)) return false;
                if (currentFilter.banji && i.banji !== currentFilter.banji) return false;
                if (currentFilter.jieci && i.jieci !== currentFilter.jieci) return false;
                return true;
            });

            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr class="empty-row"><td colspan="9">📭 暂无匹配记录</td></tr>`;
                updateStats(filtered);
                return;
            }
            const sorted = [...filtered].sort((a, b) => b.date.localeCompare(a.date) || a.banji.localeCompare(b.banji));
            sorted.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx+1}</td>
                    <td>${escapeHtml(item.date)}</td>
                    <td>${escapeHtml(item.weekNum)}</td>
                    <td>${escapeHtml(item.jieci)}</td>
                    <td>${escapeHtml(item.banji)}</td>
                    <td>${escapeHtml(item.teacher)}</td>
                    <td>${escapeHtml(item.xunkeTeacher)}</td>
                    <td>${escapeHtml(item.remark)}</td>
                    <td>
                        <button class="edit-btn" data-id="${item.id}">编辑</button>
                        <button class="del-btn" data-id="${item.id}">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() { openEdit(this.dataset.id); });
            });
            tbody.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    if (!confirm('确定删除此记录吗？')) return;
                    let list2 = getData();
                    const idx = list2.findIndex(i => i.id === id);
                    if (idx === -1) { showToast('记录不存在', 'warning'); return; }
                    list2.splice(idx, 1);
                    if (saveData(list2)) {
                        showToast('已删除', 'success');
                        renderHistory();
                        renderSummary();
                        renderAbnormal();
                    }
                });
            });
            updateStats(filtered);

        function updateStats(list) {
            document.getElementById('totalRecords').textContent = list.length;
            const teachers = new Set(list.map(i => i.teacher).filter(Boolean));
            const days = new Set(list.map(i => i.date).filter(Boolean));
            document.getElementById('totalTeachers').textContent = teachers.size;
            document.getElementById('totalDays').textContent = days.size;
        }

        function renderSummary() {
            const list = getData();
            const wrap = document.getElementById('summaryWrap');
            if (list.length === 0) { wrap.innerHTML =
                '<p style="text-align:center;color:#94a3b8;padding:20px 0;">暂无数据</p>'; return; }
            const stat = {};
            list.forEach(item => {
                const t = item.teacher || '未知';
                if (!stat[t]) stat[t] = Object.fromEntries(ALL_JIECI.map(j => [j, { num: 0, classList: [] }]));
                const j = item.jieci || '未分类';
                if (!stat[t][j]) stat[t][j] = { num: 0, classList: [] };
                stat[t][j].num += 1;
                const b = item.banji || '';
                if (b && !stat[t][j].classList.includes(b)) stat[t][j].classList.push(b);
            });
            let html =
                `<table class="data-table"><thead><tr><th>教师</th>${ALL_JIECI.map(j=>`<th>${j}</th>`).join('')}<th>总课时</th></tr></thead><tbody>`;
            Object.keys(stat).sort().forEach(t => {
                let total = 0;
                html += `<tr><td style="font-weight:600">${escapeHtml(t)}</td>`;
                ALL_JIECI.forEach(j => {
                    const n = stat[t][j]?.num || 0;
                    total += n;
                    html += `<td>${n}</td>`;
                });
                html += `<td class="total-cell">${total}</td></tr>`;
                html += `<tr class="class-row"><td>对应班级</td>`;
                ALL_JIECI.forEach(j => {

        // 导出 Excel（全部数据）
        function exportAllExcel() {
            if (!checkXLSX()) return;
            const list = getData();
            if (list.length === 0) { showToast('无数据可导出', 'warning'); return; }

            try {
                const wb = XLSX.utils.book_new();

                // 明细
                const detailHeader = ['序号', '日期', '周数', '节次', '班级', '授课教师', '巡课教师', '巡课情况'];
                const detailRows = [detailHeader];
                list.forEach((item, idx) => {
                    detailRows.push([
                        idx + 1,
                        item.date || '',
                        String(item.weekNum || ''),
                        item.jieci || '',
                        item.banji || '',
                        item.teacher || '',
                        item.xunkeTeacher || '',
                        item.remark || '正常'
                    ]);
                });
                const ws1 = XLSX.utils.aoa_to_sheet(detailRows);
                ws1['!cols'] = [
                    { wch: 6 }, { wch: 12 }, { wch: 6 }, { wch: 14 },
                    { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 10 }
                ];
                XLSX.utils.book_append_sheet(wb, ws1, '巡课明细');

                // 汇总
                const stat = {};
                list.forEach(item => {
                    const t = item.teacher || '未知教师';
                    if (!stat[t]) {
                        stat[t] = Object.fromEntries(ALL_JIECI.map(j => [j, { num: 0, classList: [] }]));
                    }
                    const j = item.jieci || '未分类';
                    if (!stat[t][j]) stat[t][j] = { num: 0, classList: [] };
                    stat[t][j].num += 1;
                    const b = item.banji || '';
                    if (b && !stat[t][j].classList.includes(b)) stat[t][j].classList.push(b);
                });

                const sumHeader = ['教师姓名'];
                ALL_JIECI.forEach(j => sumHeader.push(`${j}(课时)`));
                sumHeader.push('总课时');
                const sumRows = [sumHeader];
                Object.keys(stat).sort().forEach(t => {
                    const numRow = [t];
                    let total = 0;
                    ALL_JIECI.forEach(j => {
                        const n = stat[t][j]?.num || 0;
                        total += n;
                        numRow.push(n);
                    });
                    numRow.push(total);
                    sumRows.push(numRow);
                    const clsRow = ['对应上课班级'];
                    ALL_JIECI.forEach(j => {
                        const cls = stat[t][j]?.classList || [];
                        clsRow.push(cls.join('、'));
                    });
                    clsRow.push('');
                    sumRows.push(clsRow);
                });
                const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
                ws2['!cols'] = [{ wch: 14 }, ...ALL_JIECI.map(() => ({ wch: 10 })), { wch: 10 }];
                XLSX.utils.book_append_sheet(wb, ws2, '教师汇总');

                // ★ 使用 Blob 下载，兼容 App WebView
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([wbout], { type: 'application/octet-stream' });
                const fileName = `巡课全部数据_${getToday()}.xlsx`;

                // 尝试使用 HTML5+ 下载（如果存在）
                if (typeof window.plus !== 'undefined') {
                    // App 环境
                    const filePath = plus.io.convertLocalFileSystemURL('_doc/' + fileName);
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        plus.io.resolveLocalFileSystemURL('_doc', function(entry) {
                            entry.getFile(fileName, { create: true }, function(fileEntry) {
                                fileEntry.createWriter(function(writer) {
                                    writer.write(new Blob([wbout], { type: 'application/octet-stream' }));
                                    writer.onwrite = function() {
                                        showToast(`✅ 已保存至: _doc/${fileName}`, 'success');
                                        // 提示用户打开
                                        if (confirm('文件已保存至应用私有目录，是否导出到下载文件夹？')) {
                                            // 使用共享方式导出
                                            plus.share.sendWithSystem({
                                                files: [fileEntry.fullPath],
                                                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
                                            });
                                        }
                                    };
                                    writer.onerror = function(e) {
                                        showToast('保存失败', 'error');
                                    };
                                });
                            });
                        }, function(e) {
                            // 降级：使用浏览器下载
                            fallbackDownload(blob, fileName);
                        });
                    };
                    reader.readAsArrayBuffer(blob);
                } else {
                    // 浏览器环境
                    fallbackDownload(blob, fileName);
                }
            } catch (e) {
                showToast('导出失败: ' + e.message, 'error');
            }
        }

        // 降级下载方案
        function fallbackDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            showToast(`📊 开始下载: ${fileName}`, 'success');
        }

            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const backup = JSON.parse(ev.target.result);
                    if (!backup.data || !Array.isArray(backup.data)) throw new Error('无效备份');
                    if (!confirm(`⚠️ 恢复 ${backup.data.length} 条记录，覆盖当前数据？`)) return;
                    if (saveData(backup.data)) {
                        if (backup.teachers) saveTeacherList(backup.teachers);
                        if (backup.classes) saveClassList(backup.classes);
                        showToast(`✅ 恢复成功，${backup.data.length} 条记录`, 'success');
                        renderClassTable();
                        renderHistory();
                        renderSummary();
                        renderAbnormal();
                        renderTeacherList();
                        renderClassList();
                        populateFilter();
                    }
                } catch (e) { showToast('恢复失败: ' + e.message, 'error'); }
            };
            reader.readAsText(file);
            this.value = '';
        });

        // ================================================================
        //  教师管理
        // ================================================================
        function renderTeacherList() {
            const container = document.getElementById('teacherListContainer');
            const list = getTeacherList();
            const keyword = document.getElementById('teacherSearch').value.trim().toLowerCase();
            const filtered = keyword ? list.filter(name => name.toLowerCase().includes(keyword)) : list;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-hint">${list.length === 0 ? '暂无教师' : '未找到匹配教师'}</div>`;
                return;
            }
            let html = '';
            filtered.forEach((name, idx) => {
                const origIdx = list.indexOf(name);
                html += `<div class="list-item">
                    <span>${escapeHtml(name)}</span>
                    <button class="remove-btn" data-index="${origIdx}">删除</button>
                </div>`;
            });
            container.innerHTML = html;
            container.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const l = getTeacherList();
                    if (idx < 0 || idx >= l.length) return;
                    if (!confirm(`确定删除教师 "${l[idx]}" 吗？`)) return;
                    l.splice(idx, 1);
                    if (saveTeacherList(l)) {
                        showToast('已删除', 'success');
                        renderTeacherList();
                        renderClassTable();
                        populateFilter();
                    }
                });
            });
        }

        function addTeacherFromCandidate(name) {
            if (!name || !name.trim()) return;
            const trimmed = name.trim();
            const list = getTeacherList();
            if (list.includes(trimmed)) {
                showToast(`"${trimmed}" 已存在`, 'warning');
                return;
            }
            list.push(trimmed);
            if (saveTeacherList(list)) {
                showToast(`✅ 已添加 "${trimmed}"`, 'success');
                renderTeacherList();
                renderClassTable();
                populateFilter();
                const input = document.getElementById('newTeacherInput');
                if (input) input.value = '';
            }
        }

        function addTeacherByButton() {
            const input = document.getElementById('newTeacherInput');
            const name = input.value.trim();
            if (!name) { showToast('请输入教师姓名', 'warning'); return; }
            addTeacherFromCandidate(name);
        }

        function bindTeacherAddAutocomplete() {
            const input = document.getElementById('newTeacherInput');
            const teacherList = getTeacherList();
            const newInput = bindAutocompleteSimple(input, teacherList, function(val) {
                addTeacherFromCandidate(val);
            });
            newInput.id = 'newTeacherInput';
            document.getElementById('addTeacherBtn').addEventListener('click', addTeacherByButton);
            newInput.addEventListener('keydown', function(e) {

        function addClass() {
            const nameInput = document.getElementById('newClassInput');
            const groupInput = document.getElementById('newClassGroup');
            const name = nameInput.value.trim();
            const group = groupInput.value.trim();
            if (!name) { showToast('请输入班级名称', 'warning'); return; }

        // ================================================================
        //  折叠面板控制
        // ================================================================
        function initCollapse() {
            const headers = document.querySelectorAll('.collapse-header');
            headers.forEach(header => {
                header.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const body = document.getElementById(targetId);
                    const arrow = this.querySelector('.arrow');
                    if (body) {
                        body.classList.toggle('open');
                        if (arrow) {
                            arrow.classList.toggle('open');
                            arrow.textContent = body.classList.contains('open') ? '▼' : '▶';
                        }
                    }
                });
            });
            document.querySelectorAll('.collapse-body').forEach(el => {
                el.classList.remove('open');
            });
            document.querySelectorAll('.arrow').forEach(el => {
                el.textContent = '▶';
                el.classList.remove('open');
            });
        }

        // ================================================================
        //  Tab 切换
        // ================================================================
        function initTabs() {
            const tabs = document.querySelectorAll('.tab-item');
            const pages = {
                page1: document.getElementById('page1'),
                page2: document.getElementById('page2'),
                page3: document.getElementById('page3')
            };
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const target = this.dataset.page;
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    Object.keys(pages).forEach(k => pages[k].classList.toggle('active', k === target));
                    if (target === 'page2') { renderHistory();
                        renderSummary();
                        renderAbnormal(); }
                    if (target === 'page3') {
                        renderTeacherList();
                        renderClassList();
                        bindTeacherAddAutocomplete();
                    }
                });
            });
        }

        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            if (!localStorage.getItem(VERSION_KEY)) localStorage.setItem(VERSION_KEY, APP_VERSION);
            else if (localStorage.getItem(VERSION_KEY) !== APP_VERSION) {
                localStorage.setItem(VERSION_KEY, APP_VERSION);
                // 迁移旧数据
                const oldTeachers = localStorage.getItem('teacherList');
                if (oldTeachers) {
                    try {
                        const parsed = JSON.parse(oldTeachers);
                        if (Array.isArray(parsed) && parsed.length > 0 && typeof parsed[0] === 'object' && parsed[0]
                            .name) {
                            const migrated = parsed.map(t => t.name);
                            localStorage.setItem(TEACHER_LIST_KEY, JSON.stringify(migrated));
                        } else if (Array.isArray(parsed) && typeof parsed[0] === 'string') {
                            localStorage.setItem(TEACHER_LIST_KEY, JSON.stringify(parsed));
                        }
                        localStorage.removeItem('teacherList');
                    } catch (_) {}
                }
                const oldClasses = localStorage.getItem('classList');
                if (oldClasses) {
                    try {
                        const parsed = JSON.parse(oldClasses);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            if (typeof parsed[0] === 'string') {
                                const migrated = parsed.map(name => ({ name, group: '高三2级部' }));
                                localStorage.setItem(CLASS_LIST_KEY, JSON.stringify(migrated));
                            } else {
                                localStorage.setItem(CLASS_LIST_KEY, JSON.stringify(parsed));
                            }
                        }
                        localStorage.removeItem('classList');
                    } catch (_) {}
                }
                if (!localStorage.getItem(TEACHER_LIST_KEY)) {
                    localStorage.setItem(TEACHER_LIST_KEY, JSON.stringify(DEFAULT_TEACHERS));
                }
                if (!localStorage.getItem(CLASS_LIST_KEY)) {
                    localStorage.setItem(CLASS_LIST_KEY, JSON.stringify(DEFAULT_CLASSES));
                }
            }
            initApp();
        });

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            if (!localStorage.getItem(VERSION_KEY)) {
                localStorage.setItem(VERSION_KEY, APP_VERSION);
            }
            initApp();
        }
    </script>
</body>
</html>
